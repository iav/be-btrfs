name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-deb:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build .deb
        run: make deb

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: deb-package
          path: build/*.deb

  build-apk:
    runs-on: ubuntu-latest
    container:
      image: alpine:latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          apk add --no-cache alpine-sdk sudo bash
          adduser -D builder
          addgroup builder abuild
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers

      - name: Fix source permissions for builder
        run: chown -R builder:builder .

      - name: Generate signing key and build .apk
        run: |
          su builder -c "abuild-keygen -ain"
          su builder -c "make apk"

      - name: Upload .apk artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk-package
          path: /home/builder/packages/**/*.apk

  release:
    needs: [build-deb, build-apk]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Delete existing release if any
        run: gh release delete ${{ github.ref_name }} --yes || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/deb-package/*.deb
            artifacts/apk-package/**/*.apk
