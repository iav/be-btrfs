# be-btrfs.conf — Boot Environment Manager configuration
#
# Search paths: /etc/be-btrfs.conf, ~/.config/be-btrfs.conf
# Format: shell-sourced (bash variables)

# --- Subvolume prefixes ---

# Prefix for boot environments
#BE_PREFIX="@be-"

# Prefix for snapshots
#SNAP_PREFIX="@snap-"

# Metadata directory on toplevel
#META_DIR=".be-meta"

# Toplevel mount point
#TOPLEVEL_MOUNT="/run/be-toplevel"

# --- Prune rules ---
#
# Format: "pattern:min_keep:min_age"
#   pattern  — glob pattern for subvolume name on toplevel
#   min_keep — minimum number to always keep
#   min_age  — do not delete younger than this (0 = no limit)
#              suffixes: h (hours), d (days), w (weeks), m (months)
#
# Active BE is never deleted.
# Rules are applied top-down; a subvolume is matched by the first
# matching rule.

PRUNE_RULES=(
    "@be-*:5:30d"
    "@snap-apt-*:10:7d"
    "@snap-*:20:30d"
)
